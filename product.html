<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Zia Cakes — Premium Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Product Page Specific Overrides ── */
    body {
      background: var(--espresso); /* Premium Dark Theme as requested */
      color: var(--cream);
      opacity: 0; /* JS will fade in on load */
      transition: opacity 0.4s ease;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .nav-bar {
      padding: var(--s24) var(--gutter);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }
    .back-btn {
      color: var(--cream);
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--sans);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0.8;
      transition: opacity var(--fast) var(--ease);
    }
    .back-btn:hover { opacity: 1; }
    
    .cake-hero-img {
      width: 100%;
      height: 55vh;
      min-height: 400px;
      object-fit: cover;
      object-position: center;
      background: rgba(44,26,14,0.1);
    }
    
    .cake-detail-bd {
      flex: 1;
      padding: var(--s40) var(--gutter) 120px; /* Padding bottom for sticky btn */
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }
    
    .c-name {
      font-family: var(--serif);
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.1;
      margin-bottom: var(--s12);
      color: var(--gold);
    }
    
    .c-price {
      font-family: var(--sans);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--cream);
      margin-bottom: var(--s16);
      display: inline-block;
    }
    
    .c-desc {
      font-size: 1.05rem;
      line-height: 1.6;
      opacity: 0.85;
      margin-bottom: var(--s32);
    }
    
    .c-options {
      margin-bottom: var(--s40);
    }
    .c-options-title {
      font-family: var(--sans);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.6;
      margin-bottom: var(--s12);
      display: block;
    }
    .c-variants {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .v-btn {
      padding: 10px 20px;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 100px;
      color: var(--cream);
      font-family: var(--sans);
      font-size: 0.85rem;
      transition: all var(--fast);
    }
    .v-btn.active {
      background: var(--gold);
      color: var(--espresso);
      border-color: var(--gold);
      font-weight: 500;
    }
    
    /* Sticky Order Button */
    .sticky-order-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: var(--s16) var(--gutter);
      background: rgba(44,26,14,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.05);
      z-index: 90;
      display: flex;
      justify-content: center;
    }
    .btn-wa-order {
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 18px 32px;
      font-family: var(--sans);
      font-size: 1.05rem;
      font-weight: 600;
      width: 100%;
      max-width: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(37,211,102,0.25);
      transition: transform var(--fast), background var(--fast);
      cursor: pointer;
    }
    .btn-wa-order:active { transform: scale(0.97); }

    /* Skeleton Loading UI */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: skel 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes skel {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    #skel-view {
      padding: var(--s40) var(--gutter);
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav class="nav-bar">
    <a href="index.html" class="back-btn" id="btn-back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Back
    </a>
  </nav>

  <!-- Content Container -->
  <main id="app-root">
    
    <!-- Loading Skeleton -->
    <div id="skel-view">
      <div class="skeleton" style="width: 100%; height: 45vh; max-height:400px; margin-bottom: 24px; border-radius: 20px;"></div>
      <div class="skeleton" style="width: 60%; height: 48px; margin-bottom: 16px;"></div>
      <div class="skeleton" style="width: 30%; height: 32px; margin-bottom: 24px;"></div>
      <div class="skeleton" style="width: 100%; height: 20px; margin-bottom: 8px;"></div>
      <div class="skeleton" style="width: 80%; height: 20px;"></div>
    </div>
    
    <!-- Dynamic Product View (Hidden initially) -->
    <div id="product-view" style="display: none;">
      <img src="" alt="Cake Image" id="p-img" class="cake-hero-img" />
      <div class="cake-detail-bd">
        <h1 id="p-name" class="c-name">Loading...</h1>
        <div class="pcard-rating" id="p-rating" style="margin-bottom: 12px; color: var(--gold);">⭐ 4.5 </div>
        <div id="p-price" class="c-price">₹--</div>
        <p id="p-desc" class="c-desc">Beautifully handcrafted premium cake, made fresh to order. Experience indulgence at its finest.</p>
        
        <div class="c-options">
          <span class="c-options-title">Select Weight</span>
          <div class="c-variants">
            <button class="v-btn active">1 kg</button>
            <button class="v-btn">1.5 kg</button>
            <button class="v-btn">2 kg (Custom)</button>
          </div>
        </div>
      </div>
      
      <!-- Sticky Mobile CTA -->
      <div class="sticky-order-bar">
        <button class="btn-wa-order" id="btn-wa">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
          </svg>
          Order on WhatsApp
        </button>
      </div>
    </div>
  </main>

  <!-- Firebase integration -->
  <script type="module" src="product.js"></script>
</body>
</html>
